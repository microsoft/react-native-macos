jobs:
  - job: NpmEsrpRelease
    displayName: NPM ESRP Release
    variables:
      - name: publish_react_native_macos
        value: $[ stageDependencies.NpmPack.NpmPack.outputs['config.publish_react_native_macos'] ]
      - name: publishTag
        value: $[ stageDependencies.NpmPack.NpmPack.outputs['config.publishTag'] ]
    timeoutInMinutes: 30
    templateContext:
      type: releaseJob
      isProduction: true
      inputs:
        - input: pipelineArtifact
          artifactName: NpmPackedTarballs
          targetPath: $(Pipeline.Workspace)/npm-packed-tarballs
    steps:
      - checkout: self
        clean: true
        fetchFilter: blob:none

      - task: UseNode@1
        inputs:
          version: '22.22.0'
        displayName: Use Node.js 22.22.0

      - script: node .ado/scripts/npm-pack.mts --no-pack --check-npm "$(Pipeline.Workspace)/npm-packed-tarballs"
        displayName: Remove already-published packages

      - pwsh: |
          $tgzFiles = Get-ChildItem -Path "$(Pipeline.Workspace)/npm-packed-tarballs" -Filter "*.tgz" -Recurse
          $hasPackages = $tgzFiles.Count -gt 0
          Write-Host "Found $($tgzFiles.Count) unpublished package(s)"
          Write-Host "##vso[task.setvariable variable=HasPackagesToPublish]$($hasPackages.ToString().ToLowerInvariant())"
        displayName: Check for packages to publish

      - pwsh: |
          $required = @{
            EsrpConnectedServiceName = $env:ESRP_CONNECTED_SERVICE_NAME
            EsrpKeyVaultName = $env:ESRP_KEY_VAULT_NAME
            EsrpAuthCertName = $env:ESRP_AUTH_CERT_NAME
            EsrpSignCertName = $env:ESRP_SIGN_CERT_NAME
            EsrpClientId = $env:ESRP_CLIENT_ID
            EsrpTenantId = $env:ESRP_TENANT_ID
            EsrpOwners = $env:ESRP_OWNERS
            EsrpApprovers = $env:ESRP_APPROVERS
          }
          $missing = @(
            $required.GetEnumerator() |
              Where-Object { [string]::IsNullOrWhiteSpace($_.Value) -or $_.Value -match '^\$\(.+\)$' } |
              ForEach-Object { $_.Key }
          )
          if ($missing.Count -gt 0) {
            throw "Missing ESRP onboarding variable(s) in React-native-macos Secrets: $($missing -join ', ')"
          }
        displayName: Validate ESRP onboarding
        condition: and(succeeded(), eq(variables['HasPackagesToPublish'], 'true'))
        env:
          ESRP_CONNECTED_SERVICE_NAME: $(EsrpConnectedServiceName)
          ESRP_KEY_VAULT_NAME: $(EsrpKeyVaultName)
          ESRP_AUTH_CERT_NAME: $(EsrpAuthCertName)
          ESRP_SIGN_CERT_NAME: $(EsrpSignCertName)
          ESRP_CLIENT_ID: $(EsrpClientId)
          ESRP_TENANT_ID: $(EsrpTenantId)
          ESRP_OWNERS: $(EsrpOwners)
          ESRP_APPROVERS: $(EsrpApprovers)

      # ESRP accepts one productstate. Additional tags remain deferred until a
      # token-free post-publish mechanism is available.
      - task: EsrpRelease@11
        displayName: ESRP release to npmjs.com
        condition: and(succeeded(), eq(variables['HasPackagesToPublish'], 'true'))
        inputs:
          connectedservicename: $(EsrpConnectedServiceName)
          usemanagedidentity: false
          keyvaultname: $(EsrpKeyVaultName)
          authcertname: $(EsrpAuthCertName)
          signcertname: $(EsrpSignCertName)
          clientid: $(EsrpClientId)
          domaintenantid: $(EsrpTenantId)
          contenttype: npm
          folderlocation: $(Pipeline.Workspace)\npm-packed-tarballs
          productstate: $(publishTag)
          owners: $(EsrpOwners)
          approvers: $(EsrpApprovers)
