name: PR

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches: [ "main", "*-stable", "release/*", "*-merge" ]

concurrency:
  # Ensure single build of a pull request. `main` should not be affected.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-title:
    name: "Lint PR title"
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0
      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          node-version: '22'
          cache-npm-dependencies: ''
      # We lint the PR title instead of the commit message to avoid script injection attacks.
      # Using environment variables prevents potential security vulnerabilities as described in:
      # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#example-of-a-script-injection-attack
      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | npx @rnx-kit/commitlint-lite@2.0.0
  
  build-website:
    name: "Build the website"
    permissions: {}
    if: github.base_ref == 'main'
    uses: ./.github/workflows/microsoft-build-website.yml

  npm-publish-dry-run:
    name: "NPM Publish (Dry Run)"
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0
      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          node-version: '22'
      - name: Install dependencies
        run: yarn
      - name: Show pending version bumps
        run: yarn changeset status || true
      - name: Build packages
        run: yarn build
      - name: Simulate publish (dry run)
        run: |
          yarn workspaces foreach -vv --all --topological --no-private npm publish --tag dry-run --tolerate-republish --dry-run

  check-changesets:
    name: "Check for Changesets"
    permissions: {}
    runs-on: ubuntu-latest
    # Only required for PRs targeting stable branches; skip the version bump PR itself
    if: >-
      ${{ endsWith(github.base_ref, '-stable')
          && !startsWith(github.head_ref, 'changeset-release/') }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0
      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          node-version: '22'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Validate changesets
        run: yarn change:check
  
  yarn-constraints:
    name: "Check Yarn Constraints"
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0
      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          node-version: '22'
      - name: Install dependencies
        run: yarn
      - name: Check constraints
        run: yarn constraints

  javascript-tests:
    name: "JavaScript Tests"
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0
      
      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          node-version: '22'
      
      - name: Install npm dependencies
        run: yarn install
      
      - name: Run Jest tests
        run: yarn test-ci
      
      - name: Run Flow type checker
        run: yarn flow-check
      
      - name: Run ESLint
        run: yarn lint
      
      - name: Run Prettier format check
        run: yarn format-check

  build-rntester:
    name: "Build RNTester"
    permissions: {}
    uses: ./.github/workflows/microsoft-build-rntester.yml

  prebuild-macos-core:
    name: "Prebuild macOS Core"
    permissions: {}
    uses: ./.github/workflows/microsoft-prebuild-macos-core.yml

  # The init and test-app integration gates integration-test react-native-macos as it is
  # consumed by a real project. That is only possible once the target minor is actually
  # published to npm: react-native-macos-init installs a published react-native-macos, and
  # react-native-test-app declares a supported react-native-macos range. For the very first
  # release of a new minor (nothing published yet), skip them; they self-heal for later
  # patch releases once the minor is on npm.
  check-release-published:
    name: "Check release published"
    permissions: {}
    if: ${{ endsWith(github.base_ref, '-stable') }}
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.check.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
      - name: Determine if the target react-native-macos minor is published
        id: check
        run: |
          MINOR=$(node -e "const v = require('./packages/react-native/package.json').peerDependencies['react-native']; const [maj, min] = v.split('-')[0].split('.'); console.log(maj + '.' + min);")
          echo "Target react-native-macos minor: ${MINOR}"
          if npm view "react-native-macos@^${MINOR}.0-0" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "react-native-macos ${MINOR}.x is published; integration gates will run."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "react-native-macos ${MINOR}.x is not yet published; skipping integration gates (first release of a new minor)."
          fi

  test-react-native-macos-init:
    name: "Test react-native-macos init"
    permissions: {}
    needs: check-release-published
    if: ${{ endsWith(github.base_ref, '-stable') && needs.check-release-published.outputs.published == 'true' }}
    uses: ./.github/workflows/microsoft-test-react-native-macos-init.yml

  react-native-test-app-integration:
    name: "Test react-native-test-app integration"
    permissions: {}
    needs: check-release-published
    if: ${{ endsWith(github.base_ref, '-stable') && needs.check-release-published.outputs.published == 'true' }}
    uses: ./.github/workflows/microsoft-react-native-test-app-integration.yml

  PR:
    name: "PR"
    if: always()
    permissions: {}
    runs-on: ubuntu-latest
    needs:
      - lint-title
      - npm-publish-dry-run
      - check-changesets
      - yarn-constraints
      - javascript-tests
      - build-rntester
      - prebuild-macos-core
      - check-release-published
      - test-react-native-macos-init
      - react-native-test-app-integration
    steps:
      - name: Check for failures or cancellations
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed or were cancelled."
          exit 1
      - name: All required jobs passed
        run: echo "All required jobs completed successfully."
