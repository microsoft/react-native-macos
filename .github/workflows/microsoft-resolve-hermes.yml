name: Resolve Hermes

on:
  workflow_call:

jobs:
  resolve-hermes:
    name: "Resolve Hermes"
    runs-on: macos-15
    timeout-minutes: 15
    outputs:
      hermes-commit: ${{ steps.resolve.outputs.hermes-commit }}
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
      recomposed: ${{ steps.recompose.outputs.recomposed }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0

      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          node-version: '22'
          platform: macos

      - name: Install npm dependencies
        run: yarn install

      - name: Download upstream Hermes tarball
        id: download
        working-directory: packages/react-native
        run: |
          node -e "
            const {downloadUpstreamHermesTarball} = require('./scripts/ios-prebuild/macosVersionResolver');
            downloadUpstreamHermesTarball('Debug').then(r => {
              require('fs').writeFileSync('/tmp/hermes-download-result.json', JSON.stringify(r));
            });
          "
          RESULT=$(cat /tmp/hermes-download-result.json)
          if [ "$RESULT" != "null" ]; then
            TARBALL=$(node -e "console.log(JSON.parse(process.argv[1]).tarballPath)" "$RESULT")
            VERSION=$(node -e "console.log(JSON.parse(process.argv[1]).version)" "$RESULT")
            echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Downloaded upstream Hermes tarball for version $VERSION"
          else
            echo "No upstream tarball available"
          fi

      - name: Recompose xcframework with macOS slice
        id: recompose
        if: steps.download.outputs.tarball != ''
        run: |
          TARBALL="${{ steps.download.outputs.tarball }}"

          # Extract tarball
          mkdir -p hermes-destroot
          tar -xzf "$TARBALL" -C hermes-destroot --strip-components=2

          echo "=== Upstream tarball contents ==="
          ls -la hermes-destroot/Library/Frameworks/

          # Collect existing frameworks from the universal xcframework
          XCFW="hermes-destroot/Library/Frameworks/universal/hermes.xcframework"
          FRAMEWORKS=()
          for fw in "$XCFW"/*/hermes.framework; do
            if [ -d "$fw" ]; then
              echo "Found slice: $fw"
              FRAMEWORKS+=(-framework "$fw")
            fi
          done

          # Add standalone macOS framework
          MAC_FW="hermes-destroot/Library/Frameworks/macosx/hermes.framework"
          if [ -d "$MAC_FW" ]; then
            echo "Found standalone macOS slice: $MAC_FW"
            FRAMEWORKS+=(-framework "$MAC_FW")
          else
            echo "::error::Upstream tarball missing macosx/hermes.framework"
            echo "recomposed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create new xcframework at a temp path (can't overwrite in-place
          # because the source frameworks live inside the old xcframework)
          XCFW_NEW="hermes-destroot/Library/Frameworks/universal/hermes-new.xcframework"
          echo "Creating new universal xcframework with ${#FRAMEWORKS[@]} frameworks..."
          xcodebuild -create-xcframework "${FRAMEWORKS[@]}" \
            -output "$XCFW_NEW" \
            -allow-internal-distribution

          # Swap in the new xcframework and clean up
          rm -rf "$XCFW"
          mv "$XCFW_NEW" "$XCFW"
          rm -rf hermes-destroot/Library/Frameworks/macosx

          echo "=== Recomposed xcframework ==="
          ls -la "$XCFW"/

          echo "recomposed=true" >> "$GITHUB_OUTPUT"

      - name: Upload recomposed Hermes artifacts
        if: steps.recompose.outputs.recomposed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-artifacts
          path: hermes-destroot
          retention-days: 30

      # Fallback: resolve Hermes commit for build-from-source
      - name: Resolve Hermes commit at merge base
        if: steps.recompose.outputs.recomposed != 'true'
        id: resolve
        working-directory: packages/react-native
        run: |
          COMMIT=$(node -e "const {hermesCommitAtMergeBase} = require('./scripts/ios-prebuild/macosVersionResolver'); console.log(hermesCommitAtMergeBase().commit);" 2>&1 | grep -E '^[0-9a-f]{40}$')
          echo "hermes-commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Resolved Hermes commit: $COMMIT"

      - name: Restore Hermes cache
        if: steps.recompose.outputs.recomposed != 'true'
        id: cache
        uses: actions/cache/restore@v4
        with:
          key: hermes-v1-${{ steps.resolve.outputs.hermes-commit }}-Debug
          path: hermes-destroot

      - name: Upload cached Hermes artifacts
        if: steps.recompose.outputs.recomposed != 'true' && steps.cache.outputs.cache-hit == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-artifacts
          path: hermes-destroot
          retention-days: 30

  build-hermesc:
    name: "Build hermesc"
    if: ${{ needs.resolve-hermes.outputs.recomposed != 'true' && needs.resolve-hermes.outputs.cache-hit != 'true' }}
    needs: resolve-hermes
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          platform: macos
          cache-npm-dependencies: ''

      - name: Clone Hermes
        uses: actions/checkout@v4
        with:
          repository: facebook/hermes
          ref: ${{ needs.resolve-hermes.outputs.hermes-commit }}
          path: hermes

      - name: Build hermesc
        working-directory: hermes
        env:
          HERMES_PATH: ${{ github.workspace }}/hermes
          JSI_PATH: ${{ github.workspace }}/hermes/API/jsi
          MAC_DEPLOYMENT_TARGET: '14.0'
        run: |
          source $GITHUB_WORKSPACE/packages/react-native/sdks/hermes-engine/utils/build-apple-framework.sh
          build_host_hermesc

      - name: Upload hermesc artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermesc
          path: hermes/build_host_hermesc
          retention-days: 30

  build-hermes-slice:
    name: "Hermes ${{ matrix.slice }}"
    if: ${{ needs.resolve-hermes.outputs.recomposed != 'true' && needs.resolve-hermes.outputs.cache-hit != 'true' }}
    needs: [resolve-hermes, build-hermesc]
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        slice: [iphoneos, iphonesimulator, macosx, xros, xrsimulator]
        include:
          - slice: iphoneos
            platform: ios
          - slice: iphonesimulator
            platform: ios
          - slice: macosx
            platform: macos
          - slice: xros
            platform: visionos
          - slice: xrsimulator
            platform: visionos
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          platform: ${{ matrix.platform }}
          cache-npm-dependencies: ''

      - name: Clone Hermes
        uses: actions/checkout@v4
        with:
          repository: facebook/hermes
          ref: ${{ needs.resolve-hermes.outputs.hermes-commit }}
          path: hermes

      - name: Download hermesc
        uses: actions/download-artifact@v4
        with:
          name: hermesc
          path: hermes/build_host_hermesc

      - name: Restore hermesc permissions
        run: chmod +x ${{ github.workspace }}/hermes/build_host_hermesc/bin/hermesc

      - name: Build Hermes slice (${{ matrix.slice }})
        working-directory: hermes
        env:
          BUILD_TYPE: Debug
          HERMES_PATH: ${{ github.workspace }}/hermes
          JSI_PATH: ${{ github.workspace }}/hermes/API/jsi
          IOS_DEPLOYMENT_TARGET: '15.1'
          MAC_DEPLOYMENT_TARGET: '14.0'
          XROS_DEPLOYMENT_TARGET: '1.0'
          RELEASE_VERSION: '1000.0.0'
        run: |
          bash $GITHUB_WORKSPACE/packages/react-native/sdks/hermes-engine/utils/build-ios-framework.sh "${{ matrix.slice }}"

      - name: Upload slice artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-slice-${{ matrix.slice }}
          path: hermes/destroot
          retention-days: 30

  assemble-hermes:
    name: "Assemble Hermes xcframework"
    if: ${{ needs.resolve-hermes.outputs.recomposed != 'true' && needs.resolve-hermes.outputs.cache-hit != 'true' }}
    needs: [resolve-hermes, build-hermes-slice]
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Download all slice artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hermes-slice-*
          path: /tmp/slices

      - name: Assemble destroot from slices
        run: |
          mkdir -p ${{ github.workspace }}/hermes/destroot/Library/Frameworks
          for slice_dir in /tmp/slices/hermes-slice-*; do
            slice_name=$(basename "$slice_dir" | sed 's/hermes-slice-//')
            echo "Copying slice: $slice_name"
            cp -R "$slice_dir/Library/Frameworks/$slice_name" ${{ github.workspace }}/hermes/destroot/Library/Frameworks/
            # Copy include and bin directories (identical across slices, only need one copy)
            if [ -d "$slice_dir/include" ] && [ ! -d ${{ github.workspace }}/hermes/destroot/include ]; then
              cp -R "$slice_dir/include" ${{ github.workspace }}/hermes/destroot/
            fi
            if [ -d "$slice_dir/bin" ]; then
              cp -R "$slice_dir/bin" ${{ github.workspace }}/hermes/destroot/
            fi
          done
          echo "Assembled destroot contents:"
          ls -la ${{ github.workspace }}/hermes/destroot/Library/Frameworks/

      - name: Create universal xcframework
        working-directory: hermes
        env:
          HERMES_PATH: ${{ github.workspace }}/hermes
        run: |
          source $GITHUB_WORKSPACE/packages/react-native/sdks/hermes-engine/utils/build-apple-framework.sh
          create_universal_framework "iphoneos" "iphonesimulator" "macosx" "xros" "xrsimulator"

      - name: Save Hermes cache
        uses: actions/cache/save@v4
        with:
          key: hermes-v1-${{ needs.resolve-hermes.outputs.hermes-commit }}-Debug
          path: hermes/destroot

      - name: Upload Hermes artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-artifacts
          path: hermes/destroot
          retention-days: 30
