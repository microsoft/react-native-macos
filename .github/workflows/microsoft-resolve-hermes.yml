# Resolve Hermes — reusable workflow called by microsoft-prebuild-macos-core.yml
#
# Strategy (fast path first):
#   1. Download upstream Hermes tarball from Maven/Sonatype
#   2. If found → recompose xcframework (add macOS slice) → upload artifact → done
#   3. If not found → resolve Hermes commit at merge base → check cache → upload if cached
#
# Build-from-source fallback (only when recomposed != true AND cache-hit != true):
#   build-hermesc → build 5 platform slices in parallel → assemble universal xcframework
#
name: Resolve Hermes

on:
  workflow_call:

jobs:
  # ---------------------------------------------------------------------------
  # Fast path: download upstream tarball and recompose, or resolve commit + cache
  # ---------------------------------------------------------------------------
  resolve-hermes:
    name: "Resolve Hermes"
    runs-on: macos-15
    timeout-minutes: 15
    outputs:
      hermes-commit: ${{ steps.resolve.outputs.hermes-commit }}
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
      recomposed: ${{ steps.recompose.outputs.recomposed }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0

      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          node-version: '22'
          platform: macos

      - name: Install npm dependencies
        run: yarn install

      # Step 1: Try to download a prebuilt Hermes tarball from upstream Maven/Sonatype.
      # Writes tarball= and version= to $GITHUB_OUTPUT if successful.
      - name: Download upstream Hermes tarball
        id: download
        run: node .github/scripts/resolve-hermes.mts download-hermes Debug

      # Step 2: If tarball found, recompose the xcframework to include the macOS slice
      # (or skip if macOS is already present in the universal xcframework).
      # Writes recomposed=true/false to $GITHUB_OUTPUT.
      - name: Recompose xcframework with macOS slice
        id: recompose
        if: steps.download.outputs.tarball != ''
        run: >-
          node .github/scripts/resolve-hermes.mts
          recompose-xcframework
          "${{ steps.download.outputs.tarball }}"
          "${{ github.workspace }}/hermes-destroot"

      # Upload recomposed artifacts — the prebuild-macos-core workflow downloads these
      - name: Upload recomposed Hermes artifacts
        if: steps.recompose.outputs.recomposed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-artifacts
          path: hermes-destroot
          retention-days: 30

      # Step 3 (fallback): No upstream tarball — resolve the Hermes commit hash
      # at the merge base with facebook/react-native and check the build cache.
      - name: Resolve Hermes commit at merge base
        if: steps.recompose.outputs.recomposed != 'true'
        id: resolve
        run: node .github/scripts/resolve-hermes.mts resolve-commit

      - name: Restore Hermes cache
        if: steps.recompose.outputs.recomposed != 'true'
        id: cache
        uses: actions/cache/restore@v4
        with:
          key: hermesv1-engine-${{ steps.resolve.outputs.hermes-commit }}-Debug
          path: hermes-destroot

      - name: Upload cached Hermes artifacts
        if: steps.recompose.outputs.recomposed != 'true' && steps.cache.outputs.cache-hit == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-artifacts
          path: hermes-destroot
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Build-from-source fallback — only runs when no recomposed or cached artifact
  # Pipeline: hermesc (host compiler) → 5 platform slices → assemble xcframework
  # ---------------------------------------------------------------------------
  build-hermesc:
    name: "Build hermesc"
    if: ${{ needs.resolve-hermes.outputs.recomposed != 'true' && needs.resolve-hermes.outputs.cache-hit != 'true' }}
    needs: resolve-hermes
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          platform: macos
          cache-npm-dependencies: ''

      - name: Clone Hermes
        uses: actions/checkout@v4
        with:
          repository: facebook/hermes
          ref: ${{ needs.resolve-hermes.outputs.hermes-commit }}
          path: hermes

      # HermesV1's CMakeLists requires CMAKE_BUILD_TYPE explicitly. The upstream
      # `build_host_hermesc` helper doesn't set it, so we invoke cmake directly here.
      - name: Build hermesc
        working-directory: hermes
        env:
          HERMES_PATH: ${{ github.workspace }}/hermes
          JSI_PATH: ${{ github.workspace }}/hermes/API/jsi
          MAC_DEPLOYMENT_TARGET: '14.0'
        run: |
          cmake -S . -B build_host_hermesc -DJSI_DIR="$JSI_PATH" -DCMAKE_BUILD_TYPE=Release
          cmake --build ./build_host_hermesc --target hermesc -j "$(sysctl -n hw.ncpu)"

      - name: Upload hermesc artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermesc
          path: hermes/build_host_hermesc
          retention-days: 30

  build-hermes-slice:
    name: "Hermes ${{ matrix.slice }}"
    if: ${{ needs.resolve-hermes.outputs.recomposed != 'true' && needs.resolve-hermes.outputs.cache-hit != 'true' }}
    needs: [resolve-hermes, build-hermesc]
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        slice: [iphoneos, iphonesimulator, macosx, xros, xrsimulator]
        include:
          - slice: iphoneos
            platform: ios
          - slice: iphonesimulator
            platform: ios
          - slice: macosx
            platform: macos
          - slice: xros
            platform: visionos
          - slice: xrsimulator
            platform: visionos
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Setup toolchain
        uses: ./.github/actions/microsoft-setup-toolchain
        with:
          platform: ${{ matrix.platform }}
          cache-npm-dependencies: ''

      - name: Clone Hermes
        uses: actions/checkout@v4
        with:
          repository: facebook/hermes
          ref: ${{ needs.resolve-hermes.outputs.hermes-commit }}
          path: hermes

      - name: Download hermesc
        uses: actions/download-artifact@v4
        with:
          name: hermesc
          path: hermes/build_host_hermesc

      - name: Restore hermesc permissions
        run: chmod +x ${{ github.workspace }}/hermes/build_host_hermesc/bin/hermesc

      - name: Build Hermes slice (${{ matrix.slice }})
        working-directory: hermes
        env:
          BUILD_TYPE: Debug
          HERMES_PATH: ${{ github.workspace }}/hermes
          JSI_PATH: ${{ github.workspace }}/hermes/API/jsi
          IOS_DEPLOYMENT_TARGET: '15.1'
          MAC_DEPLOYMENT_TARGET: '14.0'
          XROS_DEPLOYMENT_TARGET: '1.0'
          RELEASE_VERSION: '1000.0.0'
        run: |
          bash $GITHUB_WORKSPACE/packages/react-native/sdks/hermes-engine/utils/build-ios-framework.sh "${{ matrix.slice }}"

      - name: Upload slice artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-slice-${{ matrix.slice }}
          path: hermes/destroot
          retention-days: 30

  assemble-hermes:
    name: "Assemble Hermes xcframework"
    if: ${{ needs.resolve-hermes.outputs.recomposed != 'true' && needs.resolve-hermes.outputs.cache-hit != 'true' }}
    needs: [resolve-hermes, build-hermes-slice]
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none

      - name: Download all slice artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hermes-slice-*
          path: /tmp/slices

      - name: Assemble destroot from slices
        run: |
          mkdir -p ${{ github.workspace }}/hermes/destroot/Library/Frameworks
          for slice_dir in /tmp/slices/hermes-slice-*; do
            slice_name=$(basename "$slice_dir" | sed 's/hermes-slice-//')
            echo "Copying slice: $slice_name"
            cp -R "$slice_dir/Library/Frameworks/$slice_name" ${{ github.workspace }}/hermes/destroot/Library/Frameworks/
            # Copy include and bin directories (identical across slices, only need one copy)
            if [ -d "$slice_dir/include" ] && [ ! -d ${{ github.workspace }}/hermes/destroot/include ]; then
              cp -R "$slice_dir/include" ${{ github.workspace }}/hermes/destroot/
            fi
            if [ -d "$slice_dir/bin" ]; then
              cp -R "$slice_dir/bin" ${{ github.workspace }}/hermes/destroot/
            fi
          done
          echo "Assembled destroot contents:"
          ls -la ${{ github.workspace }}/hermes/destroot/Library/Frameworks/

      - name: Create universal xcframework
        working-directory: hermes
        env:
          HERMES_PATH: ${{ github.workspace }}/hermes
        run: |
          source $GITHUB_WORKSPACE/packages/react-native/sdks/hermes-engine/utils/build-apple-framework.sh
          create_universal_framework "iphoneos" "iphonesimulator" "macosx" "xros" "xrsimulator"

      - name: Save Hermes cache
        uses: actions/cache/save@v4
        with:
          key: hermesv1-engine-${{ needs.resolve-hermes.outputs.hermes-commit }}-Debug
          path: hermes/destroot

      - name: Upload Hermes artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-artifacts
          path: hermes/destroot
          retention-days: 30
