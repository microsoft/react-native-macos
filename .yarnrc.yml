enableScripts: false

nodeLinker: pnpm # [macOS]

npmMinimalAgeGate: 7d

yarnPath: .yarn/releases/yarn-4.12.0.cjs

# [macOS] Declare direct dependencies that upstream package manifests omit and
# that were previously resolved only via a hoisted node_modules. The pnpm linker
# uses a strict, non-hoisted layout, so these must be declared. Centralizing them
# here (rather than editing each package.json) keeps the upstream-tracked
# manifests pristine and confines the pnpm-compat shims to this fork-only file.
# Third-party only: yarn.config.cjs constraints do not govern packageExtensions
# deps, so no @react-native/* workspace deps belong here (they must stay in a
# manifest to remain under release-branch version-pinning).
packageExtensions:
  "@react-native/codegen@*":
    dependencies:
      "@babel/parser": "^7.25.2"
  "@react-native/babel-plugin-codegen@*":
    dependencies:
      "@babel/plugin-syntax-flow": "^7.25.0"
  "@react-native/core-cli-utils@*":
    dependencies:
      "metro": "^0.82.5"
  "@react-native/metro-babel-transformer@*":
    dependencies:
      "metro-babel-transformer": "^0.82.5"
  "@react-native/compatibility-check@*":
    dependencies:
      "invariant": "^2.2.4"
  "@react-native/tester@*":
    dependencies:
      "metro-config": "^0.82.5"
  "@react-native/eslint-plugin-monorepo@*":
    dependencies:
      "hermes-estree": "0.29.1"
  "@react-native/fantom@*":
    dependencies:
      "jest-docblock": "^29.7.0"
      "jest-message-util": "^29.7.0"
      "metro": "^0.82.5"
      "metro-config": "^0.82.5"
      "source-map": "^0.7.4"
