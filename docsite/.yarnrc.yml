# The docsite is a standalone project (not part of the monorepo workspaces).
# Yarn merges .yarnrc.yml files hierarchically, so without this the docsite would
# inherit the monorepo root's `nodeLinker: pnpm`. Docusaurus relies on hoisted
# (non-strict) resolution, so keep the docsite on the node-modules linker.
nodeLinker: node-modules
